<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .header {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    select {
      background-color: white;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
    }
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .toggle-group {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
      margin-right: 10px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .help-text {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }
    .help-text a {
      color: #007bff;
      text-decoration: none;
    }
    .help-text a:hover {
      text-decoration: underline;
    }
    .api-config {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 15px;
      background-color: #f9f9f9;
    }
    .api-config h4 {
      margin: 0 0 10px 0;
      color: #333;
    }
    .model-info {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
    }
    .feature-info {
      background-color: #e3f2fd;
      border: 1px solid #2196F3;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 12px;
      color: #1976d2;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>搜题答案助手</h3>
    <p style="font-size: 12px; color: #666; margin: 5px 0;">支持截图识题和文本选择</p>
  </div>
  
  <!-- 功能说明 -->
  <div class="feature-info">
    📷 <strong>截图识题</strong>：点击右上角"截图识题"按钮，选择支持图片的API模型<br>
    🖱️ <strong>文本选择</strong>：选中题目文本后点击浮动按钮获取答案
  </div>
  
  <!-- API接口选择 -->
  <div class="form-group">
    <label for="apiProvider">API接口:</label>
    <select id="apiProvider">
      <option value="novita">Novita AI</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic Claude</option>
      <option value="google">Google Gemini</option>
      <option value="custom">自定义API</option>
    </select>
  </div>
  
  <!-- API配置区域 -->
  <div class="api-config" id="apiConfig">
    <h4>API配置</h4>
    
    <div class="form-group">
      <label for="apiKey">API Key:</label>
      <input type="password" id="apiKey" placeholder="请输入您的API Key" required>
      <div class="help-text" id="apiKeyHelp">
        💡 获取API Key: 
        <a href="https://novita.ai/" target="_blank" rel="noopener">访问Novita AI官网</a> → 
        注册/登录 → API管理 → 创建新的API Key
      </div>
    </div>
    
    <div class="form-group">
      <label for="apiEndpoint">API端点:</label>
      <input type="text" id="apiEndpoint" placeholder="https://api.novita.ai/v3/openai/chat/completions">
      <div class="help-text">自定义API的端点URL（可选）</div>
    </div>
    
    <div class="form-group">
      <label for="model">模型:</label>
      <select id="model">
        <option value="">请先配置API Key</option>
      </select>
      <div class="model-info" id="modelInfo"></div>
    </div>
    
    <div class="form-group">
      <label for="maxTokens">最大Token数:</label>
      <input type="number" id="maxTokens" value="20000" min="100" max="100000">
      <div class="help-text">控制答案的最大长度</div>
    </div>
    
    <div class="form-group">
      <label for="temperature">温度 (创造性):</label>
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
      <span id="tempValue">0.7</span>
      <div class="help-text">0=保守准确，2=创造性回答</div>
    </div>
  </div>
  
  <!-- 功能开关 -->
  <div class="toggle-group">
    <label class="toggle-switch">
      <input type="checkbox" id="showFloatingIcon" checked>
      <span class="slider"></span>
    </label>
    <label for="showFloatingIcon">显示浮动图标</label>
  </div>
  
  <button id="saveSettings">保存设置</button>
  <button id="testAPI">测试API连接</button>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
