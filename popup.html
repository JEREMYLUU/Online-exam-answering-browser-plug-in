<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="account-row">
      <div class="brand">
        <div class="brand-icon">答</div>
        <div>
          <strong>搜题助手</strong>
          <span id="configState">检查配置中...</span>
        </div>
      </div>
      <label class="pro-switch" title="会员模式后续开放">
        <span>Pro 未开启</span>
        <input id="proMode" type="checkbox" disabled>
        <i></i>
      </label>
    </header>

    <section class="model-card">
      <button class="model-row" id="openTextSettings" type="button">
        <span>文字搜题</span>
        <strong id="textModelSummary">未配置</strong>
      </button>
      <button class="model-row" id="openImageSettings" type="button">
        <span>截图识题</span>
        <strong id="imageModelSummary">未配置</strong>
      </button>
      <div class="model-row static">
        <span>快速模式</span>
        <label class="switch">
          <input id="fastMode" type="checkbox" checked>
          <i></i>
        </label>
      </div>
    </section>

    <section class="primary-action">
      <button id="runScreenshot" class="icon-only" type="button" title="截图识题">📷</button>
      <button id="runTextAnswer" class="main-btn" type="button">搜题 / 截图识题</button>
    </section>

    <section class="quick-grid">
      <button id="testConnection" type="button">
        <span>⚡</span>
        <strong>测试连接</strong>
      </button>
      <button id="openOptions" type="button">
        <span>⚙️</span>
        <strong>设置</strong>
      </button>
      <button id="openTutorial" type="button">
        <span>📖</span>
        <strong>教程</strong>
      </button>
      <button id="openOptionsFooter" type="button">
        <span>🧠</span>
        <strong>更多功能</strong>
      </button>
    </section>

    <footer>
      <span>v2.6.0</span>
      <span id="statusText">选中文字后点页面浮标，或直接截图识题</span>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
